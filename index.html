<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoBlitz – Multiplayer GeoGuesser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #00f5a0;
    --accent2: #f5a000;
    --danger: #ff4466;
    --text: #f0f0f8;
    --muted: #6b6b8a;
    --border: rgba(255,255,255,0.08);
    --glow: 0 0 20px rgba(0,245,160,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ===== SCREENS ===== */
  .screen { 
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.4s, transform 0.4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

  /* ===== LOBBY ===== */
  #lobby {
    background: radial-gradient(ellipse at 30% 20%, rgba(0,245,160,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(245,160,0,0.05) 0%, transparent 60%),
                var(--bg);
    flex-direction: column;
    gap: 2rem;
    padding: 2rem;
  }

  .logo {
    text-align: center;
  }
  .logo h1 {
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .logo p {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .lobby-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    width: min(480px, 100%);
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .field-label {
    font-size: 0.75rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,245,160,0.15);
  }

  .btn {
    padding: 0.9rem 1.5rem;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0f0a;
    box-shadow: var(--glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,245,160,0.5); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger {
    background: var(--danger);
    color: white;
  }

  .divider {
    display: flex; align-items: center; gap: 1rem;
    color: var(--muted); font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .room-code-display {
    background: var(--surface2);
    border: 1px dashed var(--accent);
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.3em;
  }

  .player-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  .player-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 0.75rem;
    background: var(--surface2);
    border-radius: 10px;
    font-size: 0.9rem;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .player-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700;
  }
  .player-host-badge {
    margin-right: auto;
    background: rgba(0,245,160,0.15);
    color: var(--accent);
    font-size: 0.65rem;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
  }
  .waiting-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ===== GAME SCREEN ===== */
  #game {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
  }

  .game-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1.5rem;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .round-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .round-badge span { color: var(--accent); }

  .timer-bar-wrap {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 1s linear, background 0.5s;
  }
  .timer-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    font-weight: 600;
    min-width: 32px;
    text-align: right;
  }

  .scoreboard-mini {
    display: flex;
    gap: 0.5rem;
  }
  .score-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }
  .score-chip .chip-avatar {
    width: 16px; height: 16px;
    border-radius: 50%;
    font-size: 0.6rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }

  /* Street view area */
  .street-view-container {
    position: fixed;
    top: 56px; left: 0; right: 0; bottom: 0;
    background: var(--surface);
    overflow: hidden;
  }

  #street-view {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .location-hint {
    position: absolute;
    top: 1rem; left: 1rem;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.6rem 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  /* Map panel */
  .map-panel {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    z-index: 800;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .map-panel.expanded {
    bottom: 0; right: 0;
    width: 100%; height: 50vh;
  }

  .map-wrapper {
    width: 340px; height: 240px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: var(--glow), 0 20px 60px rgba(0,0,0,0.6);
    transition: all 0.3s;
    position: relative;
  }
  .map-panel.expanded .map-wrapper {
    width: 100%; height: 100%;
    border-radius: 0;
  }

  #guess-map { width: 100%; height: 100%; }

  .map-controls {
    position: absolute;
    bottom: 0.75rem; left: 0.75rem; right: 0.75rem;
    display: flex;
    gap: 0.5rem;
    z-index: 900;
  }

  .btn-guess {
    flex: 1;
    padding: 0.7rem;
    background: var(--accent);
    color: #0a0f0a;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-guess.active {
    opacity: 1;
    pointer-events: all;
    box-shadow: var(--glow);
  }
  .btn-guess.active:hover { transform: translateY(-2px); }

  .btn-expand {
    padding: 0.7rem 1rem;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .btn-expand:hover { border-color: var(--accent); }

  /* Other players guessing indicators */
  .guessing-indicators {
    position: fixed;
    top: 70px; right: 1rem;
    z-index: 700;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .guess-indicator {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    background: rgba(10,10,15,0.7);
    backdrop-filter: blur(8px);
    padding: 0.4rem 0.7rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .guess-indicator .gi-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .gi-thinking .gi-dot { background: var(--accent2); animation: pulse 1s infinite; }
  .gi-done .gi-dot { background: var(--accent); }

  /* ===== RESULTS SCREEN ===== */
  #results {
    flex-direction: column;
    padding: 1rem;
    overflow: auto;
    background: radial-gradient(ellipse at center, rgba(0,245,160,0.04) 0%, transparent 70%), var(--bg);
  }

  .results-content {
    width: min(700px, 100%);
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    margin: auto;
    padding: 1rem 0;
  }

  .results-header {
    text-align: center;
  }
  .results-header h2 {
    font-size: 2.5rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .results-header p {
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-top: 0.3rem;
  }

  .result-map-container {
    height: 280px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  #result-map { width: 100%; height: 100%; }

  .round-scores {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .round-score-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.2rem;
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease both;
  }
  .round-score-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .round-score-item.second::before { background: var(--accent2); }
  .round-score-item.third::before { background: var(--muted); }

  .rsi-rank {
    font-size: 1.2rem;
    font-weight: 800;
    min-width: 24px;
    text-align: center;
  }
  .rsi-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700;
  }
  .rsi-info { flex: 1; }
  .rsi-name { font-weight: 700; font-size: 0.95rem; }
  .rsi-dist {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }
  .rsi-points {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .rsi-total {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: right;
    margin-top: 0.1rem;
  }

  /* ===== FINAL SCREEN ===== */
  #final {
    flex-direction: column;
    padding: 2rem;
    gap: 2rem;
    background: radial-gradient(ellipse at center, rgba(0,245,160,0.07) 0%, transparent 60%), var(--bg);
  }

  .champion-display {
    text-align: center;
  }
  .champion-trophy { font-size: 4rem; }
  .champion-display h2 {
    font-size: 1rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin: 0.5rem 0 0.25rem;
  }
  .champion-name {
    font-size: 3rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .final-scores {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    width: min(500px, 100%);
    margin: 0 auto;
  }

  .final-score-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    animation: slideIn 0.5s ease both;
  }
  .fsr-pos { color: var(--muted); min-width: 20px; text-align: center; font-weight: 700; }
  .fsr-name { flex: 1; font-weight: 600; }
  .fsr-score { font-family: 'JetBrains Mono', monospace; font-weight: 600; color: var(--accent); }

  .score-bar-wrap {
    position: absolute;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    border-radius: 12px;
  }
  .score-bar {
    height: 100%;
    background: rgba(0,245,160,0.05);
    transition: width 1s ease;
  }

  /* ===== NOTIFICATION ===== */
  .toast {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 0.75rem 1.5rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    z-index: 9999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    box-shadow: var(--glow);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Countdown overlay */
  .countdown-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 5000;
    transition: opacity 0.4s;
  }
  .countdown-overlay.gone { opacity: 0; pointer-events: none; }
  .countdown-num {
    font-size: 12rem;
    font-weight: 800;
    color: var(--accent);
    text-shadow: var(--glow);
    animation: countPop 0.5s ease;
  }
  @keyframes countPop {
    0% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Distance popup */
  .my-guess-popup {
    position: fixed;
    bottom: calc(240px + 2.5rem);
    right: 1.5rem;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    z-index: 600;
    animation: slideIn 0.3s ease;
    box-shadow: var(--glow);
    display: none;
  }
  .my-guess-popup.show { display: block; }
  .my-guess-popup .mgi-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .my-guess-popup .mgi-val { color: var(--accent); font-size: 1.1rem; font-weight: 600; margin-top: 0.2rem; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    pointer-events: none;
    z-index: 9998;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- COUNTDOWN OVERLAY -->
<div class="countdown-overlay gone" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
</div>

<!-- ===== LOBBY ===== -->
<div class="screen" id="lobby">
  <div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;width:100%;max-width:500px;padding:1rem">
    <div class="logo">
      <h1>GeoBlitz</h1>
      <p>Multiplayer · Real-time · 5 rounds</p>
    </div>

    <div class="lobby-card" id="join-card">
      <div>
        <div class="field-label">שם שחקן</div>
        <input type="text" id="player-name" placeholder="הכנס את השם שלך..." maxlength="16">
      </div>

      <button class="btn btn-primary" onclick="createRoom()">צור חדר חדש</button>

      <div class="divider">או הצטרף לחדר קיים</div>

      <div>
        <div class="field-label">קוד חדר</div>
        <input type="text" id="room-code-input" placeholder="XXXX" maxlength="4" style="text-transform:uppercase;text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.5rem;letter-spacing:0.3em">
      </div>
      <button class="btn btn-secondary" onclick="joinRoom()">הצטרף</button>
    </div>

    <!-- Waiting room -->
    <div class="lobby-card hidden" id="waiting-card">
      <div style="text-align:center">
        <div class="field-label">קוד החדר שלך</div>
        <div class="room-code-display" id="room-code-show">----</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:0.5rem;font-family:'JetBrains Mono',monospace">שתף עם חברים</div>
      </div>

      <div>
        <div class="field-label" style="margin-bottom:0.6rem">שחקנים <span id="player-count" style="color:var(--accent)">0/8</span></div>
        <div class="player-list" id="player-list"></div>
      </div>

      <div style="display:flex;gap:0.75rem">
        <button class="btn btn-secondary" onclick="leaveLobby()" style="flex:0.4">יציאה</button>
        <button class="btn btn-primary" id="start-btn" onclick="startGame()" style="flex:1;opacity:0.4" disabled>
          התחל משחק
        </button>
      </div>

      <div id="waiting-msg" style="text-align:center;font-size:0.75rem;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:center;gap:0.5rem">
        <div class="waiting-dot"></div>
        ממתין לשחקנים נוספים...
      </div>
    </div>
  </div>
</div>

<!-- ===== GAME ===== -->
<div class="screen hidden" id="game">
  <!-- Header -->
  <div class="game-header">
    <div class="round-badge">סיבוב <span id="hdr-round">1</span>/5</div>
    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timer-bar" style="width:100%"></div>
    </div>
    <div class="timer-num" id="timer-num">60</div>
    <div class="scoreboard-mini" id="scoreboard-mini"></div>
  </div>

  <!-- Street view -->
  <div class="street-view-container">
    <img id="street-view" src="" alt="guess location">
    <div class="location-hint">
      <span>📷</span>
      <span id="hint-text">איפה בעולם זה?</span>
    </div>
  </div>

  <!-- Other players guessing -->
  <div class="guessing-indicators" id="guessing-indicators"></div>

  <!-- My guess popup -->
  <div class="my-guess-popup" id="my-guess-popup">
    <div class="mgi-label">הניחוש שלך נשלח</div>
    <div class="mgi-val" id="my-guess-dist">—</div>
  </div>

  <!-- Map panel -->
  <div class="map-panel" id="map-panel">
    <div class="map-wrapper">
      <div id="guess-map"></div>
      <div class="map-controls">
        <button class="btn-guess" id="btn-guess" onclick="submitGuess()">נחש! →</button>
        <button class="btn-expand" onclick="toggleMap()">⛶</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== RESULTS ===== -->
<div class="screen hidden" id="results">
  <div class="results-content">
    <div class="results-header">
      <h2>תוצאות סיבוב <span id="res-round">1</span></h2>
      <p id="res-location-name">—</p>
    </div>

    <div class="result-map-container">
      <div id="result-map"></div>
    </div>

    <div class="round-scores" id="round-scores"></div>

    <div style="display:flex;gap:0.75rem">
      <button class="btn btn-primary" id="next-round-btn" onclick="nextRound()" style="flex:1">
        סיבוב הבא →
      </button>
    </div>
  </div>
</div>

<!-- ===== FINAL ===== -->
<div class="screen hidden" id="final">
  <div class="champion-display">
    <div class="champion-trophy">🏆</div>
    <h2>אלוף</h2>
    <div class="champion-name" id="champion-name">—</div>
  </div>
  <div class="final-scores" id="final-scores"></div>
  <button class="btn btn-primary" onclick="resetGame()" style="width:min(300px,100%)">שחק שוב</button>
</div>

<script>
// ===== STATE =====
const AVATAR_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#20c997'];
const TOTAL_ROUNDS = 5;
const ROUND_TIME = 60;

let state = {
  myName: '',
  myId: '',
  isHost: false,
  roomCode: '',
  players: [],
  round: 0,
  timer: ROUND_TIME,
  timerInterval: null,
  guessMarker: null,
  guessMap: null,
  resultMap: null,
  myGuess: null,
  hasGuessed: false,
  locations: [],
  currentLocation: null,
  scores: {},
  roundResults: [],
  mapExpanded: false,
};

// Famous locations with real Unsplash/Wikimedia images
const LOCATIONS = [
  { name: 'מגדל אייפל, פריז', lat: 48.8584, lng: 2.2945, country: 'צרפת', img: 'https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?w=1400&q=80', hint: 'עיר האורות' },
  { name: 'קולוסאום, רומא', lat: 41.8902, lng: 12.4922, country: 'איטליה', img: 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=1400&q=80', hint: 'ארנה קדומה' },
  { name: 'גשר שער הזהב, סן פרנסיסקו', lat: 37.8199, lng: -122.4783, country: 'ארה"ב', img: 'https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=1400&q=80', hint: 'מפרץ' },
  { name: 'מפלי ניאגרה', lat: 43.0962, lng: -79.0377, country: 'קנדה', img: 'https://images.unsplash.com/photo-1489447068241-b3490214e879?w=1400&q=80', hint: 'מים רועשים' },
  { name: 'הר פוג׳י, יפן', lat: 35.3606, lng: 138.7274, country: 'יפן', img: 'https://images.unsplash.com/photo-1490806843957-31f4c9a91c65?w=1400&q=80', hint: 'הר מקודש' },
  { name: 'בי�ליותק, ברצלונה', lat: 41.3851, lng: 2.1734, country: 'ספרד', img: 'https://images.unsplash.com/photo-1539037116277-4db20889f2d4?w=1400&q=80', hint: 'גאודי' },
  { name: 'חומת סין', lat: 40.4319, lng: 116.5704, country: 'סין', img: 'https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=1400&q=80', hint: 'מבנה עתיק ענק' },
  { name: 'מק׳ו פיק׳ו, פרו', lat: -13.1631, lng: -72.5450, country: 'פרו', img: 'https://images.unsplash.com/photo-1526392060635-9d6019884377?w=1400&q=80', hint: 'אינקה' },
  { name: 'סידני אופרה, אוסטרליה', lat: -33.8568, lng: 151.2153, country: 'אוסטרליה', img: 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?w=1400&q=80', hint: 'נמל מפורסם' },
  { name: 'טאג׳ מאהל, הודו', lat: 27.1751, lng: 78.0421, country: 'הודו', img: 'https://images.unsplash.com/photo-1564507592333-c60657eea523?w=1400&q=80', hint: 'שיש לבן' },
  { name: 'אמסטרדם, הולנד', lat: 52.3676, lng: 4.9041, country: 'הולנד', img: 'https://images.unsplash.com/photo-1512470876302-972faa2aa9a4?w=1400&q=80', hint: 'תעלות' },
  { name: 'אנטארקטיקה', lat: -77.8419, lng: 166.6863, country: 'אנטארקטיקה', img: 'https://images.unsplash.com/photo-1485841938031-1bf81239b815?w=1400&q=80', hint: 'הכי קר בעולם' },
  { name: 'ניו יורק, ארה"ב', lat: 40.7128, lng: -74.0060, country: 'ארה"ב', img: 'https://images.unsplash.com/photo-1485871981521-5b1fd3805793?w=1400&q=80', hint: 'העיר שלא ישנה' },
  { name: 'לונדון, אנגליה', lat: 51.5074, lng: -0.1278, country: 'אנגליה', img: 'https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=1400&q=80', hint: 'ביג בן' },
  { name: 'דובאי, UAE', lat: 25.2048, lng: 55.2708, country: 'אמירויות', img: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1400&q=80', hint: 'ענן וזהב' },
];

// ===== UTILS =====
function uid() { return Math.random().toString(36).slice(2,8).toUpperCase(); }
function dist(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function calcScore(km) {
  if (km < 10) return 5000;
  if (km > 20000) return 0;
  return Math.round(5000 * Math.exp(-km / 2000));
}
function fmtDist(km) {
  return km < 1 ? `${Math.round(km*1000)}m` : `${Math.round(km).toLocaleString()}km`;
}
function playerColor(id) {
  const idx = state.players.findIndex(p => p.id === id);
  return AVATAR_COLORS[idx % AVATAR_COLORS.length];
}
function playerInitials(name) { return name.slice(0,2).toUpperCase(); }

function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ===== LOBBY =====
function createRoom() {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { showToast('הכנס שם!'); return; }
  state.myName = name;
  state.myId = uid();
  state.isHost = true;
  state.roomCode = uid().slice(0,4);
  state.players = [{ id: state.myId, name, isHost: true }];
  state.scores = { [state.myId]: 0 };

  document.getElementById('room-code-show').textContent = state.roomCode;
  document.getElementById('join-card').classList.add('hidden');
  document.getElementById('waiting-card').classList.remove('hidden');
  renderPlayerList();
  updateStartBtn();

  // Simulate other players joining over time
  simulateOtherPlayers();
}

function joinRoom() {
  const name = document.getElementById('player-name').value.trim();
  const code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if (!name) { showToast('הכנס שם!'); return; }
  if (code.length !== 4) { showToast('קוד חדר לא תקין!'); return; }

  state.myName = name;
  state.myId = uid();
  state.isHost = false;
  state.roomCode = code;

  // Simulate joining (in real app would use WebSocket)
  const fakeHost = { id: uid(), name: 'Noa', isHost: true };
  state.players = [fakeHost, { id: state.myId, name, isHost: false }];
  state.scores = {};
  state.players.forEach(p => state.scores[p.id] = 0);

  document.getElementById('room-code-show').textContent = state.roomCode;
  document.getElementById('join-card').classList.add('hidden');
  document.getElementById('waiting-card').classList.remove('hidden');
  renderPlayerList();
  updateStartBtn();
  showToast(`הצטרפת לחדר ${code}!`);
}

function leaveLobby() {
  document.getElementById('join-card').classList.remove('hidden');
  document.getElementById('waiting-card').classList.add('hidden');
  state.players = [];
  clearInterval(state.botInterval);
}

const BOT_NAMES = ['Lior', 'Maya', 'Eitan', 'Tal', 'Shira', 'Dan'];
let botIdx = 0;
function simulateOtherPlayers() {
  botIdx = 0;
  state.botInterval = setInterval(() => {
    if (botIdx >= 3) { clearInterval(state.botInterval); return; }
    if (state.players.length >= 6) { clearInterval(state.botInterval); return; }
    const bot = { id: uid(), name: BOT_NAMES[botIdx++], isHost: false, isBot: true };
    state.players.push(bot);
    state.scores[bot.id] = 0;
    renderPlayerList();
    updateStartBtn();
    showToast(`${bot.name} הצטרף!`);
  }, 1800);
}

function renderPlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  state.players.forEach((p, i) => {
    const col = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const el = document.createElement('div');
    el.className = 'player-item';
    el.innerHTML = `
      <div class="player-avatar" style="background:${col}22;color:${col}">${playerInitials(p.name)}</div>
      <span>${p.name}</span>
      ${p.isHost ? '<span class="player-host-badge">HOST</span>' : ''}
    `;
    list.appendChild(el);
  });
  document.getElementById('player-count').textContent = `${state.players.length}/8`;
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  const msg = document.getElementById('waiting-msg');
  const canStart = state.isHost && state.players.length >= 2;
  btn.disabled = !canStart;
  btn.style.opacity = canStart ? '1' : '0.4';
  msg.style.display = state.players.length >= 2 ? 'none' : 'flex';
}

// ===== GAME START =====
function startGame() {
  clearInterval(state.botInterval);
  state.round = 0;
  state.roundResults = [];

  // Shuffle locations
  state.locations = [...LOCATIONS].sort(() => Math.random()-0.5).slice(0, TOTAL_ROUNDS);

  showCountdown(() => {
    showScreen('game');
    initGuessMap();
    beginRound();
  });
}

function showCountdown(cb) {
  const overlay = document.getElementById('countdown-overlay');
  const num = document.getElementById('countdown-num');
  overlay.classList.remove('gone');
  let n = 3;
  num.textContent = n;
  const iv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(iv);
      overlay.classList.add('gone');
      cb();
      return;
    }
    num.textContent = n;
    num.style.animation = 'none';
    setTimeout(() => num.style.animation = 'countPop 0.5s ease', 10);
  }, 1000);
}

// ===== GUESS MAP =====
function initGuessMap() {
  if (state.guessMap) return;
  state.guessMap = L.map('guess-map', { zoomControl: false, attributionControl: false }).setView([30, 0], 1);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.guessMap);
  L.control.zoom({ position: 'topright' }).addTo(state.guessMap);

  state.guessMap.on('click', function(e) {
    if (state.hasGuessed) return;
    if (state.guessMarker) state.guessMarker.remove();
    state.myGuess = e.latlng;
    state.guessMarker = L.circleMarker(e.latlng, {
      radius: 10,
      fillColor: '#00f5a0',
      color: '#0a0f0a',
      weight: 2,
      fillOpacity: 1
    }).addTo(state.guessMap);
    document.getElementById('btn-guess').classList.add('active');
  });
}

function toggleMap() {
  state.mapExpanded = !state.mapExpanded;
  const panel = document.getElementById('map-panel');
  panel.classList.toggle('expanded', state.mapExpanded);
  setTimeout(() => state.guessMap && state.guessMap.invalidateSize(), 350);
}

// ===== ROUND =====
function beginRound() {
  state.round++;
  state.hasGuessed = false;
  state.myGuess = null;
  state.currentLocation = state.locations[state.round - 1];

  // Reset map
  if (state.guessMarker) { state.guessMarker.remove(); state.guessMarker = null; }
  document.getElementById('btn-guess').classList.remove('active');
  document.getElementById('my-guess-popup').classList.remove('show');

  // Map panel back to mini
  state.mapExpanded = false;
  document.getElementById('map-panel').classList.remove('expanded');

  // Update header
  document.getElementById('hdr-round').textContent = state.round;
  document.getElementById('street-view').src = state.currentLocation.img;
  document.getElementById('hint-text').textContent = state.currentLocation.hint;

  updateScoreboardMini();
  renderGuessingIndicators();
  startTimer();
  simulateBotGuesses();
}

function startTimer() {
  clearInterval(state.timerInterval);
  state.timer = ROUND_TIME;
  updateTimerUI();

  state.timerInterval = setInterval(() => {
    state.timer--;
    updateTimerUI();
    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      if (!state.hasGuessed) submitGuess();
    }
  }, 1000);
}

function updateTimerUI() {
  const pct = (state.timer / ROUND_TIME) * 100;
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct + '%';
  bar.style.background = state.timer < 15
    ? 'linear-gradient(90deg,#ff4466,#ff4466)'
    : state.timer < 30
    ? 'linear-gradient(90deg,#f5a000,#f5a000)'
    : 'linear-gradient(90deg,#00f5a0,#f5a000)';
  document.getElementById('timer-num').textContent = state.timer;
  document.getElementById('timer-num').style.color = state.timer < 15 ? '#ff4466' : 'var(--text)';
}

function updateScoreboardMini() {
  const sorted = [...state.players].sort((a,b) => (state.scores[b.id]||0) - (state.scores[a.id]||0));
  const el = document.getElementById('scoreboard-mini');
  el.innerHTML = sorted.slice(0,4).map((p,i) => {
    const col = playerColor(p.id);
    return `<div class="score-chip">
      <div class="chip-avatar" style="background:${col}33;color:${col}">${playerInitials(p.name)}</div>
      ${(state.scores[p.id]||0).toLocaleString()}
    </div>`;
  }).join('');
}

function renderGuessingIndicators() {
  const el = document.getElementById('guessing-indicators');
  el.innerHTML = state.players
    .filter(p => !p.isHost || p.id !== state.myId)
    .filter(p => p.isBot)
    .map(p => {
      const col = playerColor(p.id);
      return `<div class="guess-indicator gi-thinking" id="gi-${p.id}">
        <div class="gi-dot"></div>
        <div style="color:${col};font-weight:600">${p.name}</div>
        <div>חושב...</div>
      </div>`;
    }).join('');
}

// ===== BOT GUESSES =====
function simulateBotGuesses() {
  const loc = state.currentLocation;
  state.players.filter(p => p.isBot).forEach(bot => {
    const delay = 8000 + Math.random() * 30000;
    setTimeout(() => {
      if (state.round !== state.round) return; // stale
      // Bot guesses near the real location with some error
      const error = (Math.random() - 0.5) * 40;
      bot._guess = { lat: loc.lat + error * 0.5, lng: loc.lng + error };
      bot._guessTime = state.timer;
      const gi = document.getElementById(`gi-${bot.id}`);
      if (gi) {
        gi.classList.remove('gi-thinking');
        gi.classList.add('gi-done');
        gi.querySelector('div:last-child').textContent = 'ניחש ✓';
      }
    }, delay);
  });
}

// ===== SUBMIT GUESS =====
function submitGuess() {
  if (state.hasGuessed) return;
  state.hasGuessed = true;
  clearInterval(state.timerInterval);
  document.getElementById('btn-guess').classList.remove('active');

  const loc = state.currentLocation;

  if (state.myGuess) {
    const km = dist(state.myGuess.lat, state.myGuess.lng, loc.lat, loc.lng);
    const pts = calcScore(km);
    state.scores[state.myId] = (state.scores[state.myId] || 0) + pts;

    const popup = document.getElementById('my-guess-popup');
    document.getElementById('my-guess-dist').textContent = `${fmtDist(km)} · +${pts.toLocaleString()} נק'`;
    popup.classList.add('show');
  }

  // Wait for bots then show results
  showToast('ניחוש נרשם! ממתין לשחקנים...');
  setTimeout(showResults, 3000);
}

// ===== RESULTS =====
function showResults() {
  clearInterval(state.timerInterval);
  const loc = state.currentLocation;

  // Calculate bot results
  state.players.filter(p => p.isBot).forEach(bot => {
    if (!bot._guess) {
      bot._guess = { lat: loc.lat + (Math.random()-0.5)*60, lng: loc.lng + (Math.random()-0.5)*60 };
    }
    const km = dist(bot._guess.lat, bot._guess.lng, loc.lat, loc.lng);
    const pts = calcScore(km);
    bot._lastDist = km;
    bot._lastPts = pts;
    state.scores[bot.id] = (state.scores[bot.id] || 0) + pts;
  });

  // My result
  let myKm = null, myPts = 0;
  if (state.myGuess) {
    myKm = dist(state.myGuess.lat, state.myGuess.lng, loc.lat, loc.lng);
    myPts = calcScore(myKm);
  }

  // Build round results
  const roundData = state.players.map(p => {
    if (p.isBot) {
      return { player: p, km: p._lastDist, pts: p._lastPts, total: state.scores[p.id], guess: p._guess };
    } else {
      return { player: p, km: myKm, pts: myPts, total: state.scores[p.id], guess: state.myGuess };
    }
  }).sort((a,b) => a.km - b.km);

  showScreen('results');
  document.getElementById('res-round').textContent = state.round;
  document.getElementById('res-location-name').textContent = `${loc.name} · ${loc.country}`;

  // Init result map
  if (state.resultMap) { state.resultMap.remove(); state.resultMap = null; }
  setTimeout(() => {
    state.resultMap = L.map('result-map', { zoomControl: false, attributionControl: false }).setView([loc.lat, loc.lng], 3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.resultMap);

    // Actual location marker
    L.marker([loc.lat, loc.lng], {
      icon: L.divIcon({
        html: `<div style="background:#00f5a0;width:20px;height:20px;border-radius:50%;border:3px solid #0a0f0a;box-shadow:0 0 12px rgba(0,245,160,0.6)"></div>`,
        iconSize: [20,20], iconAnchor: [10,10]
      })
    }).addTo(state.resultMap).bindPopup(`<b>${loc.name}</b>`).openPopup();

    // Player guess lines
    roundData.forEach((r, i) => {
      if (!r.guess) return;
      const col = playerColor(r.player.id);
      L.polyline([[r.guess.lat, r.guess.lng], [loc.lat, loc.lng]], {
        color: col, weight: 2, opacity: 0.7, dashArray: '6,4'
      }).addTo(state.resultMap);
      L.circleMarker([r.guess.lat, r.guess.lng], {
        radius: 8, fillColor: col, color: '#0a0f0a', weight: 2, fillOpacity: 1
      }).addTo(state.resultMap).bindTooltip(r.player.name);
    });
  }, 200);

  // Render scores
  const el = document.getElementById('round-scores');
  el.innerHTML = '';
  roundData.forEach((r, i) => {
    const col = playerColor(r.player.id);
    const cls = i === 0 ? '' : i === 1 ? 'second' : i === 2 ? 'third' : '';
    const rank = ['🥇','🥈','🥉'][i] || (i+1);
    const item = document.createElement('div');
    item.className = `round-score-item ${cls}`;
    item.style.animationDelay = `${i * 0.1}s`;
    item.innerHTML = `
      <div class="rsi-rank">${rank}</div>
      <div class="rsi-avatar" style="background:${col}22;color:${col}">${playerInitials(r.player.name)}</div>
      <div class="rsi-info">
        <div class="rsi-name">${r.player.name}</div>
        <div class="rsi-dist">${r.km !== null ? fmtDist(r.km) : 'לא ניחש'}</div>
      </div>
      <div>
        <div class="rsi-points">+${(r.pts||0).toLocaleString()}</div>
        <div class="rsi-total">סה"כ: ${(r.total||0).toLocaleString()}</div>
      </div>
    `;
    el.appendChild(item);
  });

  const nextBtn = document.getElementById('next-round-btn');
  nextBtn.textContent = state.round >= TOTAL_ROUNDS ? 'תוצאות סופיות →' : 'סיבוב הבא →';
}

function nextRound() {
  if (state.round >= TOTAL_ROUNDS) {
    showFinalResults();
  } else {
    showScreen('game');
    beginRound();
  }
}

// ===== FINAL =====
function showFinalResults() {
  showScreen('final');
  confetti();

  const sorted = [...state.players].sort((a,b) => (state.scores[b.id]||0) - (state.scores[a.id]||0));
  const champion = sorted[0];
  const maxScore = state.scores[champion.id] || 1;

  document.getElementById('champion-name').textContent = champion.name;

  const el = document.getElementById('final-scores');
  el.innerHTML = '';
  sorted.forEach((p, i) => {
    const sc = state.scores[p.id] || 0;
    const pct = Math.round((sc / maxScore) * 100);
    const col = playerColor(p.id);
    const row = document.createElement('div');
    row.className = 'final-score-row';
    row.style.animationDelay = `${i * 0.15}s`;
    row.style.position = 'relative';
    row.innerHTML = `
      <div class="score-bar-wrap"><div class="score-bar" style="width:0%" data-pct="${pct}"></div></div>
      <div class="fsr-pos" style="color:${col}">${['🥇','🥈','🥉'][i]||i+1}</div>
      <div class="fsr-name" style="color:${i===0?'var(--accent)':'var(--text)'}">${p.name}</div>
      <div class="fsr-score">${sc.toLocaleString()}</div>
    `;
    el.appendChild(row);
  });

  setTimeout(() => {
    document.querySelectorAll('.score-bar').forEach(b => {
      b.style.width = b.dataset.pct + '%';
    });
  }, 500);
}

function resetGame() {
  state.players.forEach(p => { state.scores[p.id] = 0; delete p._guess; delete p._lastDist; delete p._lastPts; });
  state.round = 0;
  state.roundResults = [];
  if (state.guessMap) { state.guessMap.remove(); state.guessMap = null; }
  if (state.resultMap) { state.resultMap.remove(); state.resultMap = null; }
  state.guessMarker = null;
  showScreen('lobby');
  document.getElementById('join-card').classList.remove('hidden');
  document.getElementById('waiting-card').classList.add('hidden');
}

// ===== CONFETTI =====
function confetti() {
  const colors = ['#00f5a0','#f5a000','#ff4466','#4d96ff','#cc5de8','#ffd93d'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 6 + Math.random() * 10;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw;
      top: -20px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*2}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6000);
  }
}

// ===== INIT =====
// Quick start for solo testing
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('lobby').classList.contains('hidden') === false) {
    const nameInput = document.getElementById('player-name');
    if (document.getElementById('join-card').classList.contains('hidden') === false && nameInput.value.trim()) {
      createRoom();
    }
  }
});
</script>
</body>
